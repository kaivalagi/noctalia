name: Build & Cache Noctalia

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17

      - uses: cachix/cachix-action@v15
        with:
          name: YOUR_CACHE_NAME
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build noctalia (default)
        run: nix build .#noctalia

      - name: Build noctalia (cuda)
        run: nix build .#noctalia-cuda

      - name: Build noctalia-greeter
        run: nix build .#noctalia-greeter

      - name: Push to Cachix
        run: |
          cachix push YOUR_CACHE_NAME \
            ./result \
            ./result-cuda \
            ./result-greeter
